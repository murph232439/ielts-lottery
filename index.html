var T='p1',Q=[],B=false;
function setPart(t){
  T=t;document.getElementById('tb').querySelectorAll('button').forEach(function(b){b.className=(b.dataset.t==t?'on':'')});
  document.getElementById('res').className='res';document.getElementById('pl').style.display='';
  var c=0;
  if(t=='p1'){Q=[];D.p1.forEach(function(x){x.questions.forEach(function(q){Q.push({c:x.category,t:q})})});c=Q.length;document.getElementById('inf').textContent='Part 1 - '+c+' 问'}
  else if(t=='p2'){Q=D.p2;c=Q.length;document.getElementById('inf').textContent='Part 2 - '+c+' 题'}
  else if(t=='p3'){Q=[];D.p2.forEach(function(x){(x.p3||[]).forEach(function(q){Q.push({c:x.category,t:q,t2:x.title})})});c=Q.length;document.getElementById('inf').textContent='Part 3 - '+c+' 问'}
  document.getElementById('cnt').textContent='题库共 '+c+' 题';
}
document.getElementById('tb').onclick=function(e){if(e.target.tagName=='BUTTON')setPart(e.target.dataset.t)};
document.getElementById('btn').onclick=function(){
  if(B||Q.length==0)return;B=true;this.disabled=true;this.textContent='✦ 抽题中 ...';
  document.getElementById('pl').style.display='none';document.getElementById('res').className='res';document.getElementById('sl').className='sl s';
  var c=0,m=18,ti=setInterval(function(){
    document.getElementById('sd').textContent=Q[Math.floor(Math.random()*Q.length)].t||Q[Math.floor(Math.random()*Q.length)].title;
    c++;if(c>=m){clearInterval(ti);
    var f=Q[Math.floor(Math.random()*Q.length)];
    document.getElementById('sd').textContent=f.t||f.title;document.getElementById('sd').className='sf';
    setTimeout(function(){
      document.getElementById('sl').className='sl';document.getElementById('sd').className='';
      var title=f.t||f.title,html='';
      if(T=='p1'){html='<span class=cat>'+f.c+'</span><div class=rt>'+title+'</div>'}
      else if(T=='p2'){html='<span class=cat>'+f.category+'</span><span class=qt>'+(f.tags||[]).join(' / ')+'</span><div class=rt>'+title+'</div><div class=cue>'+(f.cue||'')+'</div>'}
      else if(T=='p3'){html='<span class=cat>'+f.c+'</span><span class=qt>'+f.t2+'</span><div class=rt>'+title+'</div>'}
      document.getElementById('res').innerHTML=html;document.getElementById('res').className='res s';
      B=false;document.getElementById('btn').disabled=false;document.getElementById('btn').textContent='🎲 再抽一次';
    },200)}
  },80);
};
setPart('p1');
