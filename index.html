e the advice \nWhat the advice was \nAnd explain why you gave the advice", "p3": ["Should people prepare before giving advice?", "ls it good to ask advice from strangers online?", "What are the personalities of people whose job is to give advice to others?", "What are the problems if you ask too many people for advice?"]}, {"id": 1155, "category": "事件类", "title": "A time when you felt proud of a family member", "tags": [], "cue": "You should say: \nWhen it happened \nWho the person is \nWhat the person did \nAnd explain why you felt proud of him/her", "p3": ["What would children do to make their parents proud?", "What did you do to make your parents proud when you were young?", "What advantages of yours make you proud?", "When was the last time that you felt proud of yourself?"]}, {"id": 470, "category": "事件类", "title": "An occasion when you were not allowed to use a mobile phone", "tags": [], "cue": "<p>\nYou should say:\nwhen it was\nwhere you were\nwhy you were not allowed to use it\nand explain how you felt about that</p>", "p3": ["How do young and old people use mobile phones differently?", "What positive and negative impact do mobile phones have on friendship?", "ls it a waste of time to take pictures with mobile phones?", "Do you think it is necessary to have laws on the use of mobile phones?"]}, {"id": 999, "category": "物品类", "title": "A law or regulation about environmental protection", "tags": ["新题"], "cue": "You should say: \nWhat it is \nHow you first learned about it \nWho benefits from it \nAnd explain how you feel about this law or regulation", "p3": ["What kind of rules do schools in China have?", "What should teachers do to make students obey rules?", "Are there any laws about education in China?", "What are the rules people should obey at work?", "What is the purpose of punishment?"]}, {"id": 806, "category": "物品类", "title": "An ambition that you have had for a long time", "tags": ["新题"], "cue": "You should say: \nWhat it is \nWhat you can for it \
